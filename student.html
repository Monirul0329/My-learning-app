<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | mNeet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200">
    <header class="fixed top-0 w-full h-20 bg-[#0b1120]/90 backdrop-blur-md border-b border-slate-800 px-6 flex justify-between items-center z-50">
        <div>
            <h1 class="text-xl font-black text-yellow-500 italic">mNeet</h1>
            <p id="userLevel" class="text-[9px] font-bold text-indigo-400 uppercase">Aspirant</p>
        </div>
        <div class="bg-yellow-500 text-slate-950 px-4 py-2 rounded-2xl font-black text-sm" id="bpDisplay">0 BP</div>
    </header>

    <main class="pt-28 px-6 max-w-2xl mx-auto pb-20">
        <div class="space-y-4">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">Available Courses</h3>
            <button onclick="loadSubject('biology')" class="w-full p-6 bg-slate-900 border border-slate-800 rounded-3xl flex justify-between items-center hover:border-yellow-500">
                <span class="font-bold text-lg">BIOLOGY</span>
                <i class="fas fa-dna text-slate-700"></i>
            </button>
            <button onclick="loadSubject('physics')" class="w-full p-6 bg-slate-900 border border-slate-800 rounded-3xl flex justify-between items-center hover:border-blue-500">
                <span class="font-bold text-lg">PHYSICS</span>
                <i class="fas fa-bolt text-slate-700"></i>
            </button>
            <button onclick="loadNCERT()" class="w-full p-6 bg-emerald-500/10 border border-emerald-500/30 rounded-3xl flex justify-between items-center">
                <span class="font-black text-emerald-500 uppercase">NCERT Library</span>
                <i class="fas fa-book-open text-emerald-500"></i>
            </button>
        </div>
    </main>

    <div id="contentScreen" class="fixed inset-0 bg-[#020617] z-[100] hidden overflow-y-auto p-6">
        <button onclick="closeScreen()" class="mb-6 bg-slate-800 px-5 py-2 rounded-xl text-xs font-bold font-mono">BACK</button>
        <div id="screenData" class="space-y-6"></div>
    </div>

    <script type="module" src="student.js"></script>
</body>
</html>
