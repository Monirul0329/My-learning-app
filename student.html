<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200">
    <header class="fixed top-0 w-full h-16 bg-[#020617]/80 backdrop-blur-md border-b border-slate-800 px-6 flex justify-between items-center z-[100]">
        <h2 class="font-black text-yellow-500 italic">mNeet</h2>
        <div class="bg-yellow-500 text-slate-950 px-4 py-1.5 rounded-xl font-black text-xs" id="bpBox">0 BP</div>
    </header>

    <main id="mainPanel" class="pt-24 pb-20 px-6 max-w-xl mx-auto space-y-4">
        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest px-2">Lectures & Quizzes</h3>
        <div id="subjectList" class="space-y-4"></div>
        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest px-2 pt-6">Documents</h3>
        <button onclick="openNCERT()" class="w-full p-8 bg-emerald-500/10 border border-emerald-500/30 rounded-[2.5rem] flex justify-between items-center">
            <span class="font-black text-emerald-500 uppercase">NCERT Books Library</span>
            <i class="fas fa-book-open text-emerald-500"></i>
        </button>
    </main>

    <div id="contentPanel" class="fixed inset-0 bg-[#020617] z-[200] hidden overflow-y-auto p-6">
        <button onclick="closePanel()" class="mb-6 bg-slate-800 px-5 py-2 rounded-xl text-[10px] font-bold"><i class="fas fa-arrow-left mr-2"></i> BACK</button>
        <div id="panelData"></div>
    </div>
    <script type="module" src="student.js"></script>
</body>
</html>
