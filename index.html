<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet | PW Style Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050810] text-white font-sans">
    
    <div id="authSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#0f172a] p-8 rounded-3xl border border-gray-800 shadow-2xl">
            <h1 class="text-5xl font-black text-yellow-500 text-center mb-2 italic">mNeet</h1>
            <p class="text-gray-400 text-center mb-8">Secure Private Learning Platform</p>
            
            <div class="space-y-4">
                <input type="text" id="name" placeholder="Full Name" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700 outline-none focus:border-yellow-500 transition">
                <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700 outline-none focus:border-yellow-500 transition">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700 outline-none focus:border-yellow-500 transition">
                <button id="btnAction" class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-all">Request Access</button>
            </div>
            <p id="msg" class="mt-4 text-center text-sm text-yellow-500 font-medium"></p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden min-h-screen bg-[#050810]">
        <nav class="p-4 bg-[#0f172a] border-b border-gray-800 flex justify-between items-center">
            <h2 class="text-2xl font-bold text-yellow-500 italic">mNeet PRO</h2>
            <button id="btnLogout" class="bg-red-600 px-4 py-2 rounded-lg text-sm font-bold">Logout</button>
        </nav>
        
        <div class="p-6 max-w-5xl mx-auto">
            <h3 class="text-xl mb-4 font-bold">Today's Lectures</h3>
            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-[#0f172a] rounded-2xl overflow-hidden border border-gray-800">
                    <div class="aspect-video bg-black flex items-center justify-center">
                        <span class="text-gray-600 italic text-sm">Video Player Loading...</span>
                    </div>
                    <div class="p-4">
                        <h4 class="font-bold text-lg">Physics: Modern Physics L-01</h4>
                        <p class="text-gray-400 text-sm">By Monirul Sir</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
    </html>
