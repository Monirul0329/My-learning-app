<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200 font-sans">

    <header id="mainHeader" class="hidden fixed top-0 w-full bg-[#0f172a] border-b border-slate-800 p-4 z-50 flex justify-between items-center shadow-xl">
        <button id="globalBackBtn" class="text-yellow-500 text-xl"><i class="fas fa-arrow-left"></i></button>
        <div class="italic font-black text-yellow-500 text-2xl tracking-tighter">mNeet</div>
        <div id="bpCoinDisplay" class="bg-yellow-500 text-black px-4 py-1.5 rounded-full font-black text-sm flex items-center gap-2">
            <i class="fas fa-coins text-xs"></i> <span id="coins">0</span> <span class="text-[10px]">BP</span>
        </div>
    </header>

    <div id="authPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md bg-[#0f172a] p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl relative">
            <h1 class="text-5xl font-black text-yellow-500 text-center mb-8 italic tracking-tighter">mNeet</h1>
            
            <div id="signupForm" class="hidden space-y-4 mb-4">
                <input type="text" id="regName" placeholder="Student Name" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500">
                <input type="text" id="regCity" placeholder="City" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none">
                <input type="text" id="regTxn" placeholder="Transaction ID (Payment)" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none">
                <select id="regRole" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 text-slate-400">
                    <option value="student">Role: Student</option>
                    <option value="teacher">Role: Teacher</option>
                </select>
            </div>

            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500">
                
                <button id="authBtn" class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-2xl font-black text-slate-950 uppercase shadow-lg transition-all active:scale-95">Login Now</button>
            </div>
            
            <div class="flex justify-between text-[11px] mt-6 px-2 font-black text-slate-500 uppercase tracking-widest">
                <button id="forgotBtn" class="hover:text-yellow-500">Forgot Password?</button>
                <button id="toggleAuth" class="text-yellow-600 hover:text-yellow-400">Create Account</button>
            </div>
            <p id="authMsg" class="text-center text-yellow-500 mt-6 text-xs font-bold bg-yellow-500/10 py-2 rounded-lg hidden"></p>
        </div>
    </div>

    <main id="appContent" class="hidden pt-28 p-6 max-w-2xl mx-auto">
        <div class="bg-slate-900/50 p-6 rounded-[2rem] border border-slate-800 mb-8">
            <div class="flex justify-between items-end mb-3">
                <span class="text-sm font-bold text-slate-400">Total Course Progress</span>
                <span id="progText" class="text-2xl font-black text-yellow-500">0%</span>
            </div>
            <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden">
                <div id="progBar" class="bg-gradient-to-r from-yellow-600 to-yellow-400 h-full w-0 transition-all duration-1000"></div>
            </div>
        </div>

        <div id="subjectGrid" class="grid grid-cols-1 gap-4">
            <div class="p-6 bg-[#0f172a] rounded-[2rem] border border-slate-800 flex justify-between items-center group cursor-pointer hover:border-yellow-500/50 transition-all">
                <div>
                    <h3 class="text-xl font-black text-slate-100 italic">Biology</h3>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">NCERT Chapter-wise</p>
                </div>
                <div class="h-12 w-12 rounded-full bg-slate-800 flex items-center justify-center text-yellow-500 group-hover:bg-yellow-500 group-hover:text-black transition-all">
                    <i class="fas fa-play ml-1"></i>
                </div>
             </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
