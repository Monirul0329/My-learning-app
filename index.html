<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200">

    <header id="mainHeader" class="hidden fixed top-0 w-full bg-[#0f172a] border-b border-slate-800 p-4 z-50 flex justify-between items-center">
        <button id="globalBackBtn" class="text-yellow-500 text-xl"><i class="fas fa-arrow-left"></i></button>
        <div class="italic font-black text-yellow-500 text-xl">mNeet</div>
        <div id="bpCoinDisplay" class="bg-yellow-500 text-black px-3 py-1 rounded-full font-bold text-sm cursor-pointer">
            <i class="fas fa-coins"></i> <span id="coins">0</span> BP
        </div>
    </header>

    <div id="authPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md bg-[#0f172a] p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl relative">
            <h1 class="text-4xl font-black text-yellow-500 text-center mb-6 italic">mNeet</h1>
            
            <div id="signupForm" class="hidden space-y-3 mb-3">
                <input type="text" id="regName" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none">
                <input type="text" id="regCity" placeholder="City" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none">
                <input type="text" id="regTxn" placeholder="Transaction ID" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none">
                <select id="regRole" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>

            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 mb-3 outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 mb-3 outline-none">
            
            <button id="authBtn" class="w-full bg-yellow-600 py-4 rounded-2xl font-black text-slate-950 uppercase shadow-lg">Login</button>
            
            <div class="flex justify-between text-[10px] mt-4 px-2 font-bold text-slate-400 uppercase">
                <button id="forgotBtn" class="hover:text-yellow-500">Forgot Password?</button>
                <button id="toggleAuth" class="text-yellow-600">Create Account</button>
            </div>
            <p id="authMsg" class="text-center text-yellow-500 mt-4 text-xs font-bold"></p>
        </div>
    </div>

    <main id="appContent" class="hidden pt-24 p-6">
        <div id="dashboardHome">
            <div class="mb-6">
                <div class="flex justify-between text-xs mb-1"><span>Overall Progress</span><span id="progText">0%</span></div>
                <div class="w-full bg-slate-800 h-2 rounded-full"><div id="progBar" class="bg-yellow-500 h-2 rounded-full w-0 transition-all"></div></div>
            </div>
            <div id="subjectGrid" class="grid grid-cols-1 gap-4"></div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
          </html>
