<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet 2026 | Entrance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-[#0f172a] p-10 rounded-[3rem] border border-slate-800 shadow-2xl">
        <h1 class="text-5xl font-black text-yellow-500 text-center mb-2 italic">mNeet</h1>
        <p class="text-slate-500 text-center mb-8 uppercase tracking-[0.3em] text-[10px]">Doctor's Portal 2026</p>
        <div class="space-y-4" id="authForm">
            <input type="email" id="email" placeholder="Medical Email" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500">
            <button id="btnLogin" class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-2xl font-black text-slate-950 shadow-lg">Login to Campus</button>
            <p id="msg" class="text-center text-xs text-yellow-500 font-bold"></p>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
