<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet 2026 | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .skeleton { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans selection:bg-yellow-500/30">

    <header id="mainHeader" class="hidden fixed top-0 w-full bg-[#0f172a]/90 backdrop-blur-md border-b border-slate-800 p-4 z-50 flex justify-between items-center shadow-2xl">
        <button id="globalBackBtn" class="text-yellow-500 text-xl hover:scale-110 transition-all"><i class="fas fa-arrow-left"></i></button>
        <div class="italic font-black text-yellow-500 text-2xl tracking-tighter">mNeet</div>
        <div class="flex items-center gap-3">
            <div class="bg-yellow-500 text-black px-4 py-1.5 rounded-full font-black text-sm flex items-center gap-2 shadow-lg">
                <i class="fas fa-coins text-[10px]"></i> <span id="coins">0</span>
            </div>
            <button id="logoutBtn" class="text-slate-400 hover:text-red-500 transition-colors"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <div id="authPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md bg-[#0f172a] p-8 rounded-[3rem] border border-slate-800 shadow-2xl">
            <h1 class="text-5xl font-black text-yellow-500 text-center mb-8 italic">mNeet</h1>
            <div id="signupFields" class="hidden space-y-4 mb-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500">
                <input type="text" id="regCity" placeholder="City" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500">
                <input type="text" id="regTxn" placeholder="Payment Transaction ID" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500">
                <select id="regRole" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none">
                    <option value="student">Role: Student</option>
                    <option value="teacher">Role: Teacher</option>
                    <option value="admin">Role: Admin</option>
                </select>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500">
                <button id="authBtn" class="w-full bg-yellow-600 py-4 rounded-2xl font-black uppercase text-slate-950 hover:bg-yellow-500 transition-all">Continue</button>
            </div>
            <button id="toggleAuth" class="w-full text-center mt-6 text-yellow-600 text-xs font-bold uppercase underline tracking-widest">Switch to Create Account</button>
            <p id="authMsg" class="mt-4 text-center text-red-500 text-xs font-bold"></p>
        </div>
    </div>

    <main id="appContent" class="hidden pt-28 p-6 max-w-2xl mx-auto pb-32">
        
        <div id="noticeContainer" class="mb-6 bg-yellow-500/10 border border-yellow-500/20 p-3 rounded-2xl overflow-hidden">
            <marquee id="adminNotice" class="text-yellow-500 text-[10px] font-black uppercase italic">Loading latest updates...</marquee>
        </div>

        <div id="studentStats" class="hidden mb-8 grid grid-cols-2 gap-4">
            <div class="bg-slate-900 p-5 rounded-[2.5rem] border border-slate-800">
                <span class="text-[10px] text-slate-500 font-bold uppercase">Learning Streak</span>
                <div class="text-xl font-black text-orange-500 mt-1"><i class="fas fa-fire"></i> <span id="streakDay">1</span> Days</div>
            </div>
            <div class="bg-slate-900 p-5 rounded-[2.5rem] border border-slate-800 text-right">
                <span class="text-[10px] text-slate-500 font-bold uppercase">Global Rank</span>
                <div class="text-xl font-black text-yellow-500 mt-1">#<span id="userRank">--</span></div>
            </div>
            <div class="col-span-2 bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 mt-2">
                <div class="flex justify-between mb-2">
                    <span class="text-[10px] font-black text-slate-500 uppercase">Syllabus Completion</span>
                    <span id="progText" class="text-yellow-500 font-black text-xs">0%</span>
                </div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden"><div id="progBar" class="bg-yellow-500 h-full w-0 transition-all duration-1000"></div></div>
            </div>
        </div>

        <div id="teacherPanel" class="hidden space-y-6 mb-10">
            <h2 class="text-2xl font-black text-blue-500 italic uppercase">Content Studio</h2>
            <div class="p-6 bg-slate-900 rounded-[2.5rem] border border-slate-800 space-y-4 shadow-2xl">
                <div class="grid grid-cols-2 gap-4">
                    <select id="upSubject" class="p-4 rounded-2xl bg-slate-950 border border-slate-700 outline-none">
                        <option value="1. Biology">01. Biology</option>
                        <option value="2. Physics">02. Physics</option>
                        <option value="3. Chemistry">03. Chemistry</option>
                    </select>
                    <input type="number" id="upChapterNum" placeholder="Ch. No" class="p-4 rounded-2xl bg-slate-950 border border-slate-700 outline-none">
                </div>
                <input type="text" id="upChapter" placeholder="Chapter Name" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-700 outline-none">
                <input type="text" id="upTopic" placeholder="Topic Title" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-700 outline-none">
                <input type="text" id="upLink" placeholder="Video Link" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-700 outline-none text-blue-400">
                <button id="uploadBtn" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase hover:bg-blue-500 transition-all">Publish Content</button>
            </div>
        </div>

        <div id="adminPanel" class="hidden space-y-6 mb-10">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black text-red-500 italic uppercase">Master Control</h2>
                <div class="bg-red-500/10 text-red-500 px-3 py-1 rounded-full text-[10px] font-bold">Revenue: $<span id="revenue">0</span></div>
            </div>
            <div class="bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden shadow-2xl">
                <table class="w-full text-left text-[11px]">
                    <thead class="bg-slate-800 text-slate-500 uppercase">
                        <tr><th class="p-4">User</th><th class="p-4">TXN ID</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="adminUserTable" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>

        <div id="dashboardHome" class="hidden">
            <div class="relative mb-6">
                <input type="text" id="searchBar" placeholder="Search topics or chapters..." class="w-full p-4 pl-12 rounded-2xl bg-slate-900 border border-slate-800 outline-none focus:border-yellow-500">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-600"></i>
            </div>
            <div id="subjectGrid" class="space-y-4"></div>
        </div>

        <div id="leaderboard" class="hidden mt-10">
            <h3 class="text-xs font-black text-slate-500 uppercase mb-4 tracking-widest">Global Leaderboard</h3>
            <div id="leaderboardList" class="bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden divide-y divide-slate-800"></div>
        </div>

    </main>

    <script type="module" src="app.js"></script>
</body>
                                                                                      </html>
