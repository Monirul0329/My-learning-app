<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mNeet 2026 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #eab308; --bg: #020617; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-200">

    <header id="mainHeader" class="hidden fixed top-0 w-full glass p-4 z-50 flex justify-between items-center px-6">
        <button id="globalBackBtn" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800 border border-slate-700 active:scale-90 transition-all">
            <i class="fas fa-chevron-left text-yellow-500 text-lg"></i>
        </button>
        <div class="text-center">
            <div class="font-black text-xl italic text-yellow-500 tracking-tighter">mNeet 2026</div>
            <div id="userLevelDisplay" class="text-[9px] font-bold uppercase text-slate-400">Level: Loading...</div>
        </div>
        <div class="flex items-center gap-3">
            <div class="bg-yellow-500 text-black px-3 py-1 rounded-lg font-black text-[10px] shadow-lg shadow-yellow-500/20">
                <span id="coins">0</span> BP
            </div>
            <button id="logoutBtn" class="text-slate-400 hover:text-red-500 transition-colors">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </header>

    <div id="authPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-[#0f172a] p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
            <h1 class="text-4xl font-black text-yellow-500 mb-2 italic text-center">mNeet</h1>
            <p class="text-slate-500 text-[10px] uppercase text-center tracking-widest mb-8 font-bold">Future Doctor's Portal</p>
            
            <div id="signupFields" class="hidden space-y-3 mb-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none focus:border-yellow-600 transition-all">
                <select id="regRole" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none text-xs text-slate-400">
                    <option value="student">Student Account</option>
                    <option value="teacher">Teacher Account</option>
                </select>
            </div>

            <div class="space-y-3">
                <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none focus:border-yellow-600">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none focus:border-yellow-600">
                <button id="authBtn" class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-2xl font-black uppercase text-black transition-all">Continue</button>
            </div>
            
            <div class="flex justify-center mt-6">
                <button id="toggleAuth" class="text-[10px] font-bold text-yellow-500 uppercase tracking-widest hover:underline">Create New Access</button>
            </div>
            <p id="authMsg" class="mt-4 text-center text-red-500 text-[10px] font-bold"></p>
        </div>
    </div>

    <main id="appContent" class="hidden pt-28 p-6 max-w-2xl mx-auto pb-32">
        <section id="studentPanel" class="hidden">
            <div class="flex gap-6 border-b border-slate-800 mb-8 overflow-x-auto no-scrollbar scroll-smooth">
                <button id="tabStudy" class="nav-tab active pb-3 font-black text-[11px] uppercase whitespace-nowrap">Let's Study</button>
                <button id="tabNcert" class="nav-tab pb-3 text-slate-500 font-black text-[11px] uppercase whitespace-nowrap">NCERT Books</button>
                <button id="tabRank" class="nav-tab pb-3 text-slate-500 font-black text-[11px] uppercase whitespace-nowrap text-red-500">Weekly Rank</button>
            </div>
            <div id="mainGrid" class="space-y-4"></div>
        </section>

        <section id="teacherPanel" class="hidden space-y-6">
            <div class="p-6 bg-blue-900/10 border border-blue-900/30 rounded-[2rem]">
                <h2 class="text-blue-500 font-black italic mb-4 uppercase text-sm">Content Studio</h2>
                <div class="space-y-3">
                    <select id="upType" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800 text-xs text-slate-300">
                        <option value="video">Lecture Video</option>
                        <option value="pdf">NCERT PDF</option>
                    </select>
                    <select id="upSubject" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800 text-xs text-slate-300"></select>
                    <input type="text" id="upChapter" placeholder="Chapter Name" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800 text-slate-200">
                    <input type="text" id="upLink" placeholder="Paste Link (URL)" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800 text-slate-200">
                    <button id="uploadBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase hover:bg-blue-500 transition-all">Publish Content</button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
                    </html>
