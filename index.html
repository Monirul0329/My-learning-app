<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet 2026 | The Ultimate Battleground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200">

    <div id="dashboardSection" class="min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-96 bg-[#0b1120] border-r border-slate-800 flex flex-col h-screen sticky top-0">
            <div class="p-6">
                <h1 class="text-3xl font-black text-yellow-500 italic mb-6">mNeet <span class="text-white text-xs">2026</span></h1>
                
                <div class="grid grid-cols-3 gap-2 bg-slate-900 p-1 rounded-2xl border border-slate-800">
                    <button onclick="switchSubject('bio')" id="tab-bio" class="sub-tab py-2 rounded-xl text-[10px] font-black transition-all bg-yellow-600 text-slate-950">BIOLOGY</button>
                    <button onclick="switchSubject('phy')" id="tab-phy" class="sub-tab py-2 rounded-xl text-[10px] font-black transition-all">PHYSICS</button>
                    <button onclick="switchSubject('chem')" id="tab-chem" class="sub-tab py-2 rounded-xl text-[10px] font-black transition-all">CHEMISTRY</button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-6 pb-6 custom-scroll" id="syllabusTree">
                </div>
        </aside>

        <main class="flex-1 p-6 md:p-10">
            <div id="quizTypeSelector" class="hidden mb-10 grid grid-cols-2 md:grid-cols-5 gap-3">
                <button class="q-type bg-slate-800 p-3 rounded-xl text-[10px] font-bold border border-slate-700">A. Statement Base</button>
                <button class="q-type bg-slate-800 p-3 rounded-xl text-[10px] font-bold border border-slate-700">B. Assertion-Reason</button>
                <button class="q-type bg-slate-800 p-3 rounded-xl text-[10px] font-bold border border-slate-700">C. Correct-Incorrect</button>
                <button class="q-type bg-slate-800 p-3 rounded-xl text-[10px] font-bold border border-slate-700">D. Diagram Base</button>
                <button class="q-type bg-slate-800 p-3 rounded-xl text-[10px] font-bold border border-slate-700">E. Matching Column</button>
            </div>

            <div id="mainView" class="flex items-center justify-center min-h-[60vh] text-slate-600">
                <div class="text-center">
                    <i class="fas fa-microscope text-6xl mb-4"></i>
                    <p>Select a topic and question type to start.</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
