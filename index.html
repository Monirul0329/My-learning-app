<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200 font-sans">

    <header id="mainHeader" class="hidden fixed top-0 w-full bg-[#0f172a] border-b border-slate-800 p-4 z-50 flex justify-between items-center shadow-xl">
        <button id="globalBackBtn" class="text-yellow-500 text-xl"><i class="fas fa-arrow-left"></i></button>
        <div class="italic font-black text-yellow-500 text-2xl tracking-tighter mx-auto">mNeet</div>
        <div id="bpCoinDisplay" class="bg-yellow-500 text-black px-4 py-1.5 rounded-full font-black text-sm flex items-center gap-2">
            <i class="fas fa-coins text-xs"></i> <span id="coins">0</span>
        </div>
    </header>

    <main id="appContent" class="hidden pt-28 p-6 max-w-2xl mx-auto">
        <div id="studentStats" class="hidden bg-slate-900/50 p-6 rounded-[2rem] border border-slate-800 mb-8">
            <div class="flex justify-between items-end mb-3">
                <span class="text-sm font-bold text-slate-400">Course Progress</span>
                <span id="progText" class="text-2xl font-black text-yellow-500">0%</span>
            </div>
            <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden">
                <div id="progBar" class="bg-yellow-500 h-full w-0 transition-all duration-1000"></div>
            </div>
        </div>

        <div id="dashboardHome" class="hidden">
            <div id="subjectGrid" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="adminPanel" class="hidden space-y-6">
            <h2 class="text-2xl font-black text-red-500 italic uppercase">Admin Master Control</h2>
            <div id="pendingUserList" class="space-y-3"></div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
