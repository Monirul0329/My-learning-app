<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet 2026 - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200 font-sans selection:bg-yellow-500/30">

    <header id="mainHeader" class="hidden fixed top-0 w-full bg-[#0f172a]/80 backdrop-blur-md border-b border-slate-800 p-4 z-50 flex justify-between items-center shadow-2xl">
        <button id="globalBackBtn" class="text-yellow-500 text-xl hover:scale-110 transition-transform"><i class="fas fa-arrow-left"></i></button>
        <div class="italic font-black text-yellow-500 text-2xl tracking-tighter">mNeet</div>
        <div class="flex items-center gap-3">
            <div class="bg-yellow-500 text-black px-4 py-1.5 rounded-full font-black text-sm shadow-[0_0_15px_rgba(234,179,8,0.3)]">
                <span id="coins">0</span> <span class="text-[10px]">BP</span>
            </div>
            <button id="logoutBtn" class="text-slate-400 hover:text-red-500 transition-colors"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main id="appContent" class="hidden pt-28 p-6 max-w-2xl mx-auto pb-32">
        
        <div id="searchBox" class="mb-6 relative hidden">
            <input type="text" id="contentSearch" placeholder="Search chapters or topics..." class="w-full p-4 pl-12 rounded-2xl bg-slate-900 border border-slate-800 focus:border-yellow-500 outline-none transition-all">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
        </div>

        <div id="teacherPanel" class="hidden space-y-6 mb-10">
            <div class="flex justify-between items-center"><h2 class="text-2xl font-black text-blue-500 italic uppercase">Teacher Studio</h2></div>
            <div class="p-6 bg-slate-900 rounded-[2.5rem] border border-slate-800 space-y-4 shadow-xl">
                <div class="grid grid-cols-2 gap-4">
                    <select id="upSubject" class="p-4 rounded-2xl bg-[#020617] border border-slate-700">
                        <option value="1. Biology">01. Biology</option>
                        <option value="2. Physics">02. Physics</option>
                        <option value="3. Chemistry">03. Chemistry</option>
                    </select>
                    <input type="number" id="upChapterNum" placeholder="Ch No. (e.g. 1)" class="p-4 rounded-2xl bg-[#020617] border border-slate-700">
                </div>
                <input type="text" id="upChapter" placeholder="Chapter Name" class="w-full p-4 rounded-2xl bg-[#020617] border border-slate-700">
                <input type="text" id="upTopic" placeholder="Topic Title (e.g. 1.1 Intro)" class="w-full p-4 rounded-2xl bg-[#020617] border border-slate-700">
                <input type="text" id="upLink" placeholder="Video URL" class="w-full p-4 rounded-2xl bg-[#020617] border border-slate-700 text-blue-400">
                <button id="uploadBtn" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase hover:bg-blue-500 shadow-lg active:scale-95 transition-all">Post Content</button>
            </div>
        </div>

        <div id="adminPanel" class="hidden space-y-6 mb-10">
            <h2 class="text-2xl font-black text-red-500 italic uppercase">Control Center</h2>
            <div class="bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden shadow-2xl">
                <div class="p-4 bg-slate-800/50 border-b border-slate-700 font-bold text-xs uppercase tracking-widest text-slate-400">User Approvals</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-[11px]">
                        <tbody id="adminUserTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="studentStats" class="hidden mb-8">
            <div class="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 shadow-xl">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2"><i class="fas fa-chart-line text-yellow-500"></i><span class="text-xs font-black text-slate-400 uppercase">Learning Path</span></div>
                    <span id="progText" class="text-2xl font-black text-yellow-500 italic">0%</span>
                </div>
                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden p-[2px]">
                    <div id="progBar" class="bg-gradient-to-r from-yellow-600 to-yellow-400 h-full rounded-full w-0 transition-all duration-1000"></div>
                </div>
            </div>
        </div>

        <div id="dashboardHome" class="hidden">
            <div id="subjectGrid" class="space-y-4"></div>
        </div>

    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
