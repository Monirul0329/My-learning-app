<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mNeet Ultimate | 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-200">

    <header id="appHeader" class="hidden fixed top-0 w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-yellow-500 italic">mNeet PRO</h1>
            <div id="userInfo" class="flex items-center gap-4">
                <div id="coinDisplay" class="hidden bg-yellow-600 text-black px-3 py-1 rounded-full font-bold text-xs">
                    <span id="bpValue">0</span> BP
                </div>
                <button id="logoutBtn" class="text-slate-500"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </header>

    <div id="authPage" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-2xl">
            <h2 class="text-3xl font-black text-center text-yellow-500 mb-8 italic uppercase">Welcome</h2>
            <div id="roleSelection" class="flex gap-2 mb-6 p-1 bg-black rounded-xl">
                <button onclick="setRole('student')" id="btnStudent" class="flex-1 py-2 rounded-lg text-xs font-bold uppercase bg-yellow-600 text-black">Student</button>
                <button onclick="setRole('teacher')" id="btnTeacher" class="flex-1 py-2 rounded-lg text-xs font-bold uppercase text-slate-500">Teacher</button>
                <button onclick="setRole('admin')" id="btnAdmin" class="flex-1 py-2 rounded-lg text-xs font-bold uppercase text-slate-500">Admin</button>
            </div>
            <div id="signupFields" class="hidden space-y-3 mb-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full p-4 rounded-xl bg-black border border-slate-800 outline-none">
                <select id="teacherSub" class="hidden w-full p-4 rounded-xl bg-black border border-slate-800 outline-none text-slate-400">
                    <option value="">Select Your Subject</option>
                    <option value="Biology">Biology</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                </select>
            </div>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl bg-black border border-slate-800 outline-none mb-3">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-xl bg-black border border-slate-800 outline-none mb-6">
            <button id="authBtn" class="w-full bg-yellow-600 py-4 rounded-xl font-black uppercase text-black">Sign In</button>
            <div class="flex justify-between mt-6 px-2">
                <button id="forgotBtn" class="text-[10px] uppercase font-bold text-slate-500">Forgot Password?</button>
                <button id="toggleAuth" class="text-[10px] uppercase font-bold text-yellow-500">Create Account</button>
            </div>
        </div>
    </div>

    <main id="appBody" class="hidden pt-24 pb-32 max-w-4xl mx-auto p-4"></main>

    <div id="playerModal" class="hidden fixed inset-0 z-[100] bg-black flex flex-col p-4">
        <div class="flex justify-between items-center mb-4">
            <div id="timerDisplay" class="bg-red-600 text-white px-4 py-1 rounded-full font-mono text-sm hidden">00:00</div>
            <button id="closeModal" class="text-white text-3xl">&times;</button>
        </div>
        <div id="modalContent" class="flex-1 overflow-y-auto"></div>
    </div>

    <script type="module">
        import { authApp } from './auth.js';
        import { initTeacher } from './teacher.js';
        import { initStudent } from './student.js';
        import { initAdmin } from './admin.js';
    </script>
</body>
</html>
