<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mNeet Pro 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #eab308; --bg: #020617; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .nav-tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .locked-card { filter: grayscale(1); opacity: 0.6; pointer-events: none; position: relative; }
        .locked-card::after { content: "\f023"; font-family: "Font Awesome 5 Free"; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; color: #fbbf24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-200">

    <header id="mainHeader" class="hidden fixed top-0 w-full glass p-4 z-50 flex justify-between items-center">
        <button id="globalBackBtn" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-yellow-500/30">
            <i class="fas fa-arrow-left text-yellow-500"></i>
        </button>
        <div class="text-center">
            <div class="font-black text-lg italic text-yellow-500">mNeet 2026</div>
            <div id="roleLabel" class="text-[8px] uppercase tracking-tighter text-slate-500">Initializing...</div>
        </div>
        <div id="statusIcon" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center">
            <i class="fas fa-user-circle text-slate-400"></i>
        </div>
    </header>

    <div id="authPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-slate-900/80 p-8 rounded-[3rem] border border-slate-800">
            <h1 class="text-4xl font-black text-yellow-500 text-center mb-8 italic">mNeet</h1>
            <div id="signupGroup" class="hidden space-y-3 mb-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none">
                <input type="text" id="regCity" placeholder="City" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none">
                <select id="regRole" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none text-xs text-slate-400">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>
            <div class="space-y-3">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none">
                <button id="authBtn" class="w-full bg-yellow-600 py-4 rounded-2xl font-black uppercase text-black">Sign In</button>
                <button id="toggleAuth" class="w-full text-[10px] text-yellow-500 font-bold uppercase mt-4">Create New Account</button>
            </div>
        </div>
    </div>

    <main id="appContent" class="hidden pt-24 p-4 max-w-3xl mx-auto pb-32">
        <div id="navBar" class="flex gap-4 border-b border-slate-800 mb-6 overflow-x-auto no-scrollbar pb-2">
            </div>
        <div id="viewContainer" class="space-y-6"></div>
    </main>

    <div id="playerModal" class="hidden fixed inset-0 z-[100] bg-black/95 flex flex-col p-4">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modalTitle" class="text-yellow-500 font-black text-xs uppercase italic">Player</h3>
            <button id="closeModal" class="text-white text-3xl">&times;</button>
        </div>
        <div id="modalBody" class="flex-1 overflow-y-auto no-scrollbar"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
