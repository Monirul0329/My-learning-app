<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mNeet Ultimate 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #eab308; --bg: #020617; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; overflow-x: hidden; color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
    </style>
</head>
<body>

    <header id="mainHeader" class="hidden fixed top-0 w-full glass p-4 z-50 flex justify-between items-center px-6">
        <button id="globalBackBtn" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-yellow-500/30">
            <i class="fas fa-arrow-left text-yellow-500"></i>
        </button>
        <div class="text-center">
            <div class="font-black text-xl italic text-yellow-500 tracking-tighter">mNeet 2026</div>
            <div id="roleDisplay" class="text-[8px] font-bold uppercase text-slate-500 tracking-widest">Loading...</div>
        </div>
        <div class="flex items-center gap-3">
            <div id="coinBox" class="hidden bg-yellow-500 text-black px-3 py-1 rounded-lg font-black text-[10px]">
                <span id="coins">0</span> BP
            </div>
            <button id="logoutBtn" class="text-slate-500 hover:text-red-500 transition-all"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <div id="authPage" class="min-h-screen flex items-center justify-center p-6 bg-[#020617]">
        <div class="w-full max-w-md bg-slate-900/50 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
            <h1 class="text-4xl font-black text-yellow-500 text-center mb-8 italic tracking-tighter">mNeet</h1>
            
            <div id="roleSelector" class="flex gap-2 mb-6 bg-slate-950 p-1 rounded-2xl border border-slate-800">
                <button onclick="setAuthRole('student')" id="roleStud" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase bg-yellow-600 text-black">Student</button>
                <button onclick="setAuthRole('teacher')" id="roleTech" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-slate-500">Teacher</button>
                <button onclick="setAuthRole('admin')" id="roleAdm" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-slate-500">Admin</button>
            </div>

            <div id="signupFields" class="hidden space-y-3 mb-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full p-4 rounded-2xl outline-none">
                <input type="text" id="regCity" placeholder="City" class="w-full p-4 rounded-2xl outline-none">
            </div>

            <div class="space-y-3">
                <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-2xl outline-none">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl outline-none">
                <button id="authBtn" class="w-full bg-yellow-600 py-4 rounded-2xl font-black uppercase text-black shadow-lg shadow-yellow-600/20">Continue</button>
                <button id="forgotBtn" class="w-full text-[10px] text-slate-500 font-bold uppercase mt-2 hover:text-yellow-500 transition-colors">Forgot Password?</button>
            </div>
            
            <div class="flex justify-center mt-6">
                <button id="toggleAuth" class="text-[10px] font-bold text-yellow-500 uppercase underline">Create New Access</button>
            </div>
            <p id="authMsg" class="mt-4 text-center text-red-500 text-[10px] font-bold"></p>
        </div>
    </div>

    <main id="appContent" class="hidden pt-28 p-4 max-w-2xl mx-auto pb-32">
        <div id="navTabs" class="flex gap-4 border-b border-slate-800 mb-6 overflow-x-auto no-scrollbar scroll-smooth"></div>
        <div id="viewContainer" class="space-y-6"></div>
    </main>

    <div id="contentModal" class="hidden fixed inset-0 z-[100] bg-black/98 flex flex-col items-center p-4">
        <div class="w-full max-w-4xl flex justify-between items-center mb-4">
            <h3 id="modalTitle" class="text-yellow-500 font-black text-xs uppercase">Content</h3>
            <button id="closeModal" class="text-white text-4xl">&times;</button>
        </div>
        <div id="playerArea" class="w-full max-w-4xl flex-1 overflow-y-auto no-scrollbar"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
