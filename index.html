<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mNeet Ultimate PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #eab308; --dark: #020617; }
        body { background: var(--dark); color: #f1f5f9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .input-premium { background: #000; border: 1px solid #1e293b; color: white; padding: 1rem; border-radius: 1rem; width: 100%; outline: none; transition: 0.3s; }
        .input-premium:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(234, 179, 8, 0.2); }
        .btn-gold { background: linear-gradient(to right, #eab308, #ca8a04); color: #000; font-weight: 900; padding: 1rem; border-radius: 1rem; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .role-btn { flex: 1; py: 3; border-radius: 0.75rem; font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; transition: 0.3s; border: 1px solid transparent; }
        .role-active { background: var(--gold); color: #000; border-color: var(--gold); }
    </style>
</head>
<body>

    <section id="authPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-8 rounded-[2.5rem] shadow-2xl relative border-t border-yellow-500/30">
            <h2 class="text-3xl font-black text-yellow-500 italic text-center mb-2 uppercase">mNeet PRO</h2>
            <p class="text-[9px] text-slate-500 text-center uppercase tracking-[4px] mb-8">Future of WB Education</p>
            
            <div id="roleSelection" class="flex p-1 bg-black rounded-2xl mb-6 border border-slate-800">
                <button onclick="setRole('student')" id="btn-student" class="role-btn role-active">Student</button>
                <button onclick="setRole('teacher')" id="btn-teacher" class="role-btn">Teacher</button>
                <button onclick="setRole('admin')" id="btn-admin" class="role-btn">Admin</button>
            </div>

            <div id="signupFields" class="hidden space-y-3">
                <input type="text" id="regName" placeholder="Full Name" class="input-premium">
                <input type="text" id="regCity" placeholder="Your City" class="input-premium">
                <select id="regSubject" class="hidden input-premium text-slate-400">
                    <option value="" disabled selected>Select Your Subject</option>
                    <option value="Biology">Biology Instructor</option>
                    <option value="Physics">Physics Instructor</option>
                    <option value="Chemistry">Chemistry Instructor</option>
                </select>
            </div>

            <div class="mt-3 space-y-3">
                <input type="email" id="email" placeholder="Email Address" class="input-premium">
                <input type="password" id="pass" placeholder="Password" class="input-premium">
            </div>
            
            <button id="authBtn" onclick="handleAuth()" class="btn-gold mt-6 shadow-lg shadow-yellow-600/20">Sign In</button>
            
            <p onclick="toggleAuth()" id="toggleText" class="text-center text-[10px] text-yellow-500 mt-6 uppercase cursor-pointer font-black tracking-widest">Create New Account</p>
        </div>
    </section>

    <div id="appContainer" class="hidden min-h-screen">
        <header class="fixed top-0 w-full z-50 glass p-4 flex justify-between items-center border-b border-slate-800">
            <h1 class="text-xl font-black text-yellow-500 italic">mNeet <span class="text-white font-normal">PRO</span></h1>
            <div id="userMeta" class="flex items-center gap-4">
                <div id="coinBox" class="hidden bg-yellow-600/10 border border-yellow-500/20 px-3 py-1 rounded-full">
                    <span id="bpDisplay" class="text-yellow-500 font-bold text-xs">0 BP</span>
                </div>
                <button onclick="logout()" class="text-slate-500"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <main id="dashboard" class="pt-24 pb-32 px-6 max-w-4xl mx-auto"></main>
    </div>

        <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        
        // ⚠️ এখানে তোমার নিজের Firebase Config বসাতে ভুলো না
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Firebase Initialize করা হচ্ছে
        const app = initializeApp(firebaseConfig);
    </script>

    <script type="module" src="auth.js"></script>
    <script type="module" src="main.js"></script>
    <script type="module" src="teacher_logic.js"></script>
    <script type="module" src="student_logic.js"></script>
    <script type="module" src="quiz_engine.js"></script>
    <script type="module" src="video_system.js"></script>
    <script type="module" src="library_system.js"></script>
    <script type="module" src="admin_logic.js"></script>
    
</body>
</html>
