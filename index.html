<!DOCTYPE html>
<html>
<head>
  <title>My Learning App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
    }

    .card {
      background: white;
      color: black;
      margin: 20px auto;
      padding: 20px;
      border-radius: 12px;
      max-width: 300px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    button {
      background: #4e73df;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #2e59d9;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 5px 0;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>My Learning App 🚀</h1>
  <p>Build Your Future With Smart Learning</p>

  <div class="card">
    <h3>Student Login</h3>
    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">
    <br><br>
    <button id="loginBtn">Login</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDW3wJTOurtrqQfR2DsQ1mqj__w6-4_S",
  authDomain: "nest-mr-bio.firebaseapp.com",
  databaseURL: "https://nest-mr-bio-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nest-mr-bio",
  storageBucket: "nest-mr-bio.firebasestorage.app",
  messagingSenderId: "1051338751163",
  appId: "1:1051338751163:web:59e5f33e44b265b31fbd9e",
  measurementId: "G-DXZD3VSH46"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", function() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      alert("Login Successful ✅");
    })
    .catch((error) => {
      alert("Login Failed ❌ " + error.message);
    });

});

</script>

</body>
</html>
