<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet 2026 | Full Syllabus Battleground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200">

    <div id="dashboardSection" class="min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-96 bg-[#0b1120] border-r border-slate-800 flex flex-col h-screen sticky top-0">
            <div class="p-6">
                <h1 class="text-3xl font-black text-yellow-500 italic">mNeet <span class="text-white text-xs">2026</span></h1>
                
                <div class="flex gap-2 mt-6 bg-slate-900 p-1 rounded-2xl border border-slate-800">
                    <button onclick="switchSubject('bio')" class="sub-tab flex-1 py-2 rounded-xl text-xs font-bold transition-all bg-yellow-600 text-slate-950" id="tab-bio">BIO</button>
                    <button onclick="switchSubject('phy')" class="sub-tab flex-1 py-2 rounded-xl text-xs font-bold transition-all hover:bg-slate-800" id="tab-phy">PHY</button>
                    <button onclick="switchSubject('chem')" class="sub-tab flex-1 py-2 rounded-xl text-xs font-bold transition-all hover:bg-slate-800" id="tab-chem">CHEM</button>
                </div>

                <div class="mt-6 p-4 bg-slate-900/50 rounded-2xl border border-slate-800">
                    <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-2">
                        <span id="subjectLabel">BIOLOGY PROGRESS</span>
                        <span id="subjectPercent">0%</span>
                    </div>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div id="subjectBar" class="bg-yellow-500 h-full transition-all" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-6 pb-6 custom-scroll" id="syllabusTree">
                </div>
        </aside>

        <main class="flex-1 p-6 md:p-10">
            <header class="flex justify-between items-center mb-10">
                <h2 id="currentChapterTitle" class="text-2xl font-bold text-white">Select a Chapter</h2>
                <div class="flex gap-4">
                    <div class="bg-slate-800 px-6 py-3 rounded-2xl border border-slate-700 font-black text-yellow-500">
                        <i class="fas fa-coins mr-2"></i> <span id="userPointsDisplay">0</span> BP
                    </div>
                </div>
            </header>

            <div id="contentPlaceholder" class="text-center py-20">
                <i class="fas fa-book-reader text-6xl text-slate-800 mb-4"></i>
                <p class="text-slate-500">Choose a topic from the sidebar to start your NEET 2026 journey.</p>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
