<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200 font-sans">

    <header id="mainHeader" class="hidden fixed top-0 w-full bg-[#0f172a] border-b border-slate-800 p-4 z-50 flex justify-between items-center shadow-xl">
        <button id="globalBackBtn" class="text-yellow-500 text-xl"><i class="fas fa-arrow-left"></i></button>
        <div class="italic font-black text-yellow-500 text-2xl tracking-tighter mx-auto">mNeet</div>
        <div class="flex items-center gap-3">
            <div id="bpCoinDisplay" class="bg-yellow-500 text-black px-4 py-1.5 rounded-full font-black text-sm">
                <span id="coins">0</span> BP
            </div>
            <button id="logoutBtn" class="text-slate-400 hover:text-red-500"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div id="authPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md bg-[#0f172a] p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
            <h1 class="text-5xl font-black text-yellow-500 text-center mb-8 italic">mNeet</h1>
            <div id="signupForm" class="hidden space-y-4 mb-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
                <input type="text" id="regCity" placeholder="City" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
                <input type="text" id="regTxn" placeholder="Transaction ID (Payment Proof)" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
                <select id="regRole" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
                    <option value="student">Role: Student</option>
                    <option value="teacher">Role: Teacher</option>
                    <option value="admin">Role: Admin</option>
                </select>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
                <button id="authBtn" class="w-full bg-yellow-600 py-4 rounded-2xl font-black uppercase">Continue</button>
            </div>
            <button id="toggleAuth" class="w-full text-center mt-6 text-yellow-600 text-xs font-bold uppercase">Switch to Create Account</button>
            <p id="authMsg" class="mt-4 text-center text-red-500 text-xs"></p>
        </div>
    </div>

    <main id="appContent" class="hidden pt-28 p-6 max-w-2xl mx-auto pb-20">
        
        <div id="teacherPanel" class="hidden space-y-6 mb-10">
            <h2 class="text-2xl font-black text-blue-500 italic uppercase">Upload Content</h2>
            <div class="p-6 bg-slate-900 rounded-[2rem] border border-slate-800 space-y-4">
                <select id="upSubject" class="w-full p-4 rounded-2xl bg-[#020617] border border-slate-700">
                    <option value="Biology">Biology</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                </select>
                <input type="text" id="upChapter" placeholder="Chapter Name" class="w-full p-4 rounded-2xl bg-[#020617] border border-slate-700">
                <input type="text" id="upTopic" placeholder="Topic Name" class="w-full p-4 rounded-2xl bg-[#020617] border border-slate-700">
                <input type="text" id="upLink" placeholder="Video Link (YouTube/Drive)" class="w-full p-4 rounded-2xl bg-[#020617] border border-slate-700">
                <button id="uploadBtn" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase">Post to App</button>
            </div>
        </div>

        <div id="adminPanel" class="hidden space-y-6 mb-10">
            <h2 class="text-2xl font-black text-red-500 italic uppercase">Admin Control</h2>
            <div class="bg-slate-900 rounded-[2rem] border border-slate-800 overflow-hidden shadow-2xl">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-800 text-slate-400">
                        <tr>
                            <th class="p-4">User</th>
                            <th class="p-4">Txn ID</th>
                            <th class="p-4">Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminUserTable"></tbody>
                </table>
            </div>
        </div>

        <div id="studentStats" class="hidden mb-6">
            <div id="progBarContainer" class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800">
                <div class="flex justify-between mb-2"><span class="text-xs font-bold text-slate-400 uppercase">My Progress</span> <span id="progText" class="text-yellow-500 font-black">0%</span></div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden"><div id="progBar" class="bg-yellow-500 h-full w-0 transition-all"></div></div>
            </div>
        </div>

        <div id="dashboardHome" class="hidden">
            <div id="subjectGrid" class="space-y-4"></div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
                    </html>
