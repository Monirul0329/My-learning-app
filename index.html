<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet 2026 | Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .nav-tab.active { color: #eab308; border-bottom: 3px solid #eab308; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans">

    <header id="mainHeader" class="hidden fixed top-0 w-full glass p-4 z-50 flex justify-between items-center border-b border-slate-800">
        <button id="globalBackBtn" class="text-yellow-500 p-2"><i class="fas fa-arrow-left"></i></button>
        <div class="italic font-black text-yellow-500 text-xl">mNeet 2026</div>
        <div class="flex items-center gap-2">
            <div class="bg-yellow-500 text-black px-3 py-1 rounded-full font-black text-[10px]"><span id="coins">0</span> BP</div>
            <button id="logoutBtn" class="text-slate-500 px-2"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <div id="authPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-[#0f172a] p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
            <h1 class="text-4xl font-black text-yellow-500 text-center italic mb-8">mNeet</h1>
            <div id="signupFields" class="hidden space-y-4 mb-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none">
                <input type="text" id="regCity" placeholder="City" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none">
                <input type="text" id="regTxn" placeholder="Transaction ID" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none border-dashed border-yellow-900">
                <select id="regRole" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none">
                <button id="authBtn" class="w-full bg-yellow-600 py-4 rounded-2xl font-black uppercase text-black active:scale-95 transition-all">Continue</button>
            </div>
            <button id="toggleAuth" class="w-full text-center mt-6 text-slate-500 text-[10px] font-bold uppercase underline underline-offset-4">Create Account</button>
            <p id="authMsg" class="mt-4 text-center text-red-500 text-xs"></p>
        </div>
    </div>

    <main id="appContent" class="hidden pt-24 p-6 max-w-2xl mx-auto pb-32">
        <div id="dashboardTabs" class="flex gap-6 border-b border-slate-800 mb-6 no-scrollbar overflow-x-auto">
            <button onclick="changeTab('study')" id="tabStudy" class="nav-tab active pb-2 font-black text-[10px] uppercase tracking-widest whitespace-nowrap">Let's Study</button>
            <button onclick="changeTab('ncert')" id="tabNcert" class="nav-tab pb-2 text-slate-500 font-black text-[10px] uppercase tracking-widest whitespace-nowrap">NCERT Books</button>
        </div>

        <div id="mainGrid" class="space-y-4"></div>

        <div id="teacherPanel" class="hidden mt-10 p-6 bg-slate-900 rounded-[2rem] border border-blue-900/30">
            <h2 class="text-blue-500 font-black mb-4 uppercase text-sm italic">Content Studio</h2>
            <div class="space-y-3">
                <select id="upType" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800">
                    <option value="video">Video</option>
                    <option value="pdf">NCERT PDF</option>
                </select>
                <select id="upSubject" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800"></select>
                <input type="text" id="upChapter" placeholder="Chapter Name" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800">
                <input type="text" id="upTopic" placeholder="Topic Name" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800">
                <input type="text" id="upLink" placeholder="Link (Drive/YouTube)" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800 text-blue-400">
                <button id="uploadBtn" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs">Publish</button>
            </div>
        </div>

        <div id="adminPanel" class="hidden mt-10 space-y-4">
            <h2 class="text-red-500 font-black uppercase text-sm italic">Pending Approvals</h2>
            <div id="adminUserTable" class="space-y-3"></div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
                </html>
