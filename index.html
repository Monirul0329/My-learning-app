<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet | Next Gen Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050810] text-white font-sans">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#0f172a] p-8 rounded-3xl border border-gray-800 shadow-2xl">
            <h1 class="text-5xl font-black text-yellow-500 text-center mb-2 italic">mNeet</h1>
            <p class="text-gray-400 text-center mb-8">Secure Private Learning Platform</p>
            
            <div class="space-y-4" id="authForm">
                <input type="text" id="name" placeholder="Full Name" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700 outline-none focus:border-yellow-500 transition">
                <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700 outline-none focus:border-yellow-500 transition">
                <input type="password" id="pass" placeholder="Create Password" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700 outline-none focus:border-yellow-500 transition">
                <button id="btnSignup" class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-all">Request Access</button>
            </div>
            <p id="msg" class="mt-4 text-center text-sm text-yellow-500 font-medium"></p>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
