<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet 2026 | Full Campus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 overflow-x-hidden">

    <div id="dashboardSection" class="hidden min-h-screen flex flex-col md:flex-row">
        
        <aside class="w-full md:w-80 bg-[#0b1120] border-r border-slate-800 flex flex-col h-screen sticky top-0 p-6">
            <h1 class="text-4xl font-black text-yellow-500 italic mb-8">mNeet</h1>
            
            <div class="space-y-3 mb-8">
                <button onclick="switchSubject('bio')" id="tab-bio" class="w-full py-4 rounded-2xl font-black text-xs border border-slate-800 bg-yellow-600 text-slate-950 flex items-center px-6 gap-3 transition-all">
                    <i class="fas fa-dna"></i> BIOLOGY
                </button>
                <button onclick="switchSubject('phy')" id="tab-phy" class="w-full py-4 rounded-2xl font-black text-xs border border-slate-800 hover:bg-slate-900 flex items-center px-6 gap-3 transition-all">
                    <i class="fas fa-bolt"></i> PHYSICS
                </button>
                <button onclick="switchSubject('chem')" id="tab-chem" class="w-full py-4 rounded-2xl font-black text-xs border border-slate-800 hover:bg-slate-900 flex items-center px-6 gap-3 transition-all">
                    <i class="fas fa-flask"></i> CHEMISTRY
                </button>
                <button onclick="openNCERT()" class="w-full py-4 rounded-2xl font-black text-xs border border-emerald-500/30 bg-emerald-500/10 text-emerald-500 mt-4 flex items-center px-6 gap-3 transition-all">
                    <i class="fas fa-book-open"></i> NCERT BOOKS PDF
                </button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scroll pr-2" id="syllabusTree">
                </div>
        </aside>

        <main class="flex-1 p-6 md:p-10">
            <header class="flex justify-between items-center mb-10">
                <div id="activePath" class="text-[10px] font-black text-slate-500 tracking-widest uppercase">Select Course Content</div>
                <div class="flex gap-4">
                    <div class="bg-slate-900 px-5 py-2 rounded-xl border border-slate-800 text-yellow-500 font-black text-sm">
                        <span id="userPointsDisplay">0</span> BP COINS
                    </div>
                    <div class="bg-slate-800 px-4 py-2 rounded-xl text-[10px] font-bold text-slate-400">
                        ATTEMPT: <span id="attemptDisplay" class="text-white">1</span>
                    </div>
                </div>
            </header>

            <div id="quizTypePanel" class="hidden">
                <div class="text-center mb-10">
                    <h2 id="selectedTopicTitle" class="text-3xl font-bold text-white mb-2">Topic Name</h2>
                    <p class="text-slate-500 text-xs">Choose your challenge mode:</p>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4" id="quizTypeGrid">
                    </div>
            </div>

            <div id="quizArena" class="hidden max-w-4xl mx-auto space-y-6">
                <div class="flex justify-between items-center bg-slate-900 p-6 rounded-3xl border border-slate-800">
                    <div id="quizTimer" class="text-4xl font-mono text-red-500 font-black">01:00</div>
                    <button id="prevBtn" class="bg-slate-800 px-6 py-2 rounded-xl text-xs font-bold hover:bg-slate-700">Previous</button>
                </div>
                <div class="bg-slate-900 p-10 rounded-[3rem] border border-slate-800 shadow-2xl relative min-h-[250px] flex items-center justify-center">
                    <h3 id="questionText" class="text-2xl font-bold text-center leading-relaxed">?</h3>
                </div>
                <div id="optionsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <button id="nextBtn" class="w-full bg-yellow-600 text-slate-950 py-5 rounded-[2rem] font-black text-lg shadow-xl shadow-yellow-600/10">Next Question / Submit</button>
            </div>

            <div id="pdfViewer" class="hidden">
                <iframe src="https://ncert.nic.in/textbook.php" class="w-full h-[80vh] rounded-[2rem] border border-slate-800"></iframe>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
