<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet Biology | Advanced Battleground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200 font-sans">

    <div id="dashboardSection" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-80 bg-[#0b1120] border-r border-slate-800 p-6 flex flex-col">
            <h2 class="text-3xl font-black text-yellow-500 italic mb-10">mNeet PRO</h2>
            <div id="syllabusTree" class="space-y-4 flex-1 overflow-y-auto">
                </div>
        </aside>

        <main class="flex-1 p-6 md:p-10 relative">
            <div class="flex justify-between items-center mb-10 bg-slate-900/50 p-6 rounded-3xl border border-slate-800">
                <div class="flex gap-6">
                    <div><p class="text-[10px] text-slate-500 uppercase font-bold">BP Coins</p><h3 id="userPoints" class="text-2xl font-black text-yellow-500">0</h3></div>
                    <div><p class="text-[10px] text-slate-500 uppercase font-bold">Attempt</p><h3 id="attemptDisp" class="text-2xl font-black text-white">1</h3></div>
                </div>
                <div id="quizTimer" class="text-4xl font-mono text-red-500 font-black">00:00</div>
            </div>

            <div id="quizView" class="max-w-4xl mx-auto">
                <div class="bg-slate-900 p-10 rounded-[3rem] border border-slate-800 mb-6 shadow-2xl relative">
                    <div id="qProgress" class="absolute top-0 left-0 h-1 bg-yellow-500 transition-all" style="width: 0%"></div>
                    <h3 id="questionText" class="text-2xl font-bold text-center leading-relaxed">Select a topic to start...</h3>
                </div>
                <div id="optionsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                
                <div class="flex justify-between mt-8">
                    <button id="prevBtn" class="bg-slate-800 px-8 py-3 rounded-2xl font-bold hover:bg-slate-700 transition-all">Previous</button>
                    <button id="nextBtn" class="bg-yellow-600 text-slate-950 px-10 py-3 rounded-2xl font-black hover:bg-yellow-500">Next / Submit</button>
                </div>
            </div>

            <div id="resultPanel" class="hidden fixed inset-0 bg-[#020617]/95 flex items-center justify-center p-4 z-50 overflow-y-auto">
                <div class="bg-[#0f172a] w-full max-w-2xl p-8 rounded-[3rem] border border-slate-800 shadow-2xl">
                    <h2 class="text-3xl font-black text-center mb-8 text-yellow-500 italic">Quiz Analytics</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                        <div class="bg-slate-900 p-4 rounded-2xl text-center"><p class="text-xs text-slate-500">Correct</p><h4 id="resCorrect" class="text-xl font-bold text-green-500">0</h4></div>
                        <div class="bg-slate-900 p-4 rounded-2xl text-center"><p class="text-xs text-slate-500">Wrong</p><h4 id="resWrong" class="text-xl font-bold text-red-500">0</h4></div>
                        <div class="bg-slate-900 p-4 rounded-2xl text-center"><p class="text-xs text-slate-500">Skipped</p><h4 id="resSkip" class="text-xl font-bold text-slate-500">0</h4></div>
                        <div class="bg-slate-900 p-4 rounded-2xl text-center"><p class="text-xs text-slate-500">Accuracy</p><h4 id="resAccuracy" class="text-xl font-bold text-blue-500">0%</h4></div>
                    </div>
                    <div class="bg-yellow-500/10 border border-yellow-500/20 p-6 rounded-3xl mb-8">
                        <h4 class="text-yellow-500 font-bold mb-2 italic"><i class="fas fa-trophy mr-2"></i> Topper Comparison</h4>
                        <p class="text-sm text-slate-400">You scored <span id="userRank" class="text-white font-bold">0 BP</span>. Topper's Score: <span class="text-white font-bold">120 BP</span>. You are <span id="distTopper" class="text-yellow-500 font-bold">N/A</span> points behind.</p>
                    </div>
                    <button onclick="location.reload()" class="w-full bg-slate-800 py-4 rounded-2xl font-bold">Back to Syllabus</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
                                                                         </html>
