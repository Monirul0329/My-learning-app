<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet Biology | Advanced Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200">

    <div id="dashboardSection" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-80 bg-[#0b1120] border-r border-slate-800 p-6 flex flex-col">
            <h1 class="text-3xl font-black text-yellow-500 italic mb-8">mNeet <span class="text-xs text-white">BIO-PRO</span></h1>
            
            <div class="mb-8 p-4 bg-slate-900/50 rounded-2xl border border-slate-800">
                <div class="flex justify-between text-xs mb-2">
                    <span>Syllabus Progress</span>
                    <span id="overallPercent">0%</span>
                </div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                    <div id="overallBar" class="bg-yellow-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <nav class="space-y-4 flex-1 overflow-y-auto custom-scroll" id="chapterList">
                </nav>

            <button id="btnLogout" class="mt-4 p-4 rounded-xl bg-red-500/10 text-red-500 font-bold border border-red-500/20">Exit Campus</button>
        </aside>

        <main class="flex-1 p-4 md:p-8 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="welcomeUser" class="text-3xl font-bold">Hello, Doc!</h2>
                    <p class="text-slate-400">Current Chapter: <span id="activeChapterTitle" class="text-yellow-500 font-medium">Select a Chapter</span></p>
                </div>
                <div class="bg-yellow-500 text-slate-900 px-6 py-3 rounded-2xl font-black flex items-center gap-2 shadow-lg shadow-yellow-500/20">
                    <i class="fas fa-bolt"></i> <span id="userPoints">1200</span> XP
                </div>
            </header>

            <div id="contentView" class="max-w-4xl mx-auto">
                <div id="videoContainer" class="hidden space-y-6">
                    <div class="aspect-video bg-black rounded-[2rem] overflow-hidden border border-slate-800 shadow-2xl">
                        <iframe id="mainPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="flex justify-between items-center">
                        <h3 id="activeTopicTitle" class="text-2xl font-bold">Topic Name</h3>
                        <button id="startQuizBtn" class="bg-indigo-600 px-6 py-3 rounded-xl font-bold hover:scale-105 transition-all">Start Topic Quiz</button>
                    </div>
                </div>

                <div id="quizContainer" class="hidden space-y-6">
                    <div class="flex justify-between items-center bg-slate-900 p-4 rounded-2xl border border-slate-800">
                        <div id="quizTimer" class="text-2xl font-mono text-red-500 font-bold">00:30</div>
                        <div class="text-slate-400">Question <span id="qNum" class="text-white">1</span>/10</div>
                        <div id="quizModeBadge" class="px-4 py-1 rounded-full bg-indigo-500/20 text-indigo-400 text-xs font-bold uppercase tracking-widest border border-indigo-500/30">Practice Mode</div>
                    </div>
                    
                    <div class="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-xl min-h-[300px] flex flex-col justify-center">
                        <h3 id="questionText" class="text-2xl font-bold mb-8 text-center leading-relaxed">?</h3>
                        <div id="optionsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            </div>
                    </div>

                    <div class="flex justify-between">
                        <button id="prevBtn" class="bg-slate-800 px-8 py-3 rounded-xl font-bold disabled:opacity-50">Previous</button>
                        <button id="nextBtn" class="bg-yellow-600 text-slate-900 px-10 py-3 rounded-xl font-bold hover:bg-yellow-500">Next Question</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
