<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet BIOLOGY | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200 font-sans">

    <div id="authSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#0f172a] p-10 rounded-[2rem] border border-slate-800 shadow-2xl">
            <div class="text-center mb-10">
                <h1 class="text-5xl font-black text-yellow-500 italic tracking-tighter">mNeet</h1>
                <p class="text-slate-500 mt-2">Next Gen Biology Learning</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="name" placeholder="Student Name" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-yellow-500 outline-none transition-all">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-yellow-500 outline-none transition-all">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-yellow-500 outline-none transition-all">
                <button id="btnAction" class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-2xl font-bold text-slate-900 shadow-lg shadow-yellow-600/20 active:scale-95 transition-all">Join Biology Batch</button>
                <button id="btnLogin" class="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-2xl font-semibold transition-all">Already a Student? Login</button>
            </div>
            <p id="msg" class="mt-6 text-center text-yellow-500 font-medium"></p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-80 bg-[#0f172a] border-r border-slate-800 p-8 flex flex-col">
            <h2 class="text-3xl font-black text-yellow-500 italic mb-12">mNeet PRO</h2>
            <nav class="space-y-6 flex-1">
                <div class="space-y-2">
                    <p class="text-[10px] font-bold text-slate-500 tracking-[0.2em] uppercase pl-4">Learning Area</p>
                    <button class="w-full flex items-center gap-4 p-4 rounded-2xl bg-yellow-600 text-slate-900 font-bold"><i class="fas fa-play-circle"></i> Today's Class</button>
                    <button class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-800 transition-all font-semibold"><i class="fas fa-book-open"></i> Biology Notes</button>
                </div>
                <div id="adminPanel" class="hidden pt-10 border-t border-slate-800 space-y-4">
                    <p class="text-[10px] font-bold text-red-500 tracking-[0.2em] uppercase pl-4">Admin Controls</p>
                    <input type="text" id="videoLink" placeholder="Paste YouTube/Live Link" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-sm">
                    <button id="btnUpdateVideo" class="w-full bg-red-600 py-3 rounded-xl font-bold text-sm">Update Live Class</button>
                </div>
            </nav>
            <button id="btnLogout" class="mt-auto bg-slate-800 p-4 rounded-2xl font-bold hover:bg-red-600/20 hover:text-red-500 transition-all">Sign Out</button>
        </aside>

        <main class="flex-1 p-6 md:p-12">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
                <div>
                    <h2 id="welcomeUser" class="text-4xl font-bold text-white mb-2">Hello, Doctor!</h2>
                    <p class="text-slate-400">Ready to master Biology today?</p>
                </div>
                <div class="flex items-center gap-4 bg-yellow-600/10 border border-yellow-600/20 p-4 rounded-2xl">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    <span class="text-yellow-500 font-bold">Class Status: Live Now</span>
                </div>
            </header>

            <div class="max-w-5xl mx-auto">
                <div class="bg-black rounded-[2.5rem] overflow-hidden shadow-2xl border border-slate-800 group relative">
                    <div class="aspect-video w-full">
                        <iframe id="mainPlayer" class="w-full h-full shadow-inner" src="" frameborder="0" allowfullscreen></iframe>
                    </div>
                </div>
                <div class="mt-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div>
                        <h3 class="text-2xl font-bold" id="classTitle">Cell Biology: The Core Units (Lecture 01)</h3>
                        <p class="text-slate-400 mt-1">Biology Masterclass with Monirul Sir</p>
                    </div>
                    <div class="flex gap-4">
                        <button class="bg-indigo-600 hover:bg-indigo-500 px-8 py-4 rounded-2xl font-bold flex items-center gap-2 transition-all"><i class="fas fa-file-pdf"></i> Get PDF</button>
                        <button class="bg-emerald-600 hover:bg-emerald-500 px-8 py-4 rounded-2xl font-bold flex items-center gap-2 transition-all"><i class="fas fa-pen-nib"></i> Mock Test</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
