<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mNeet Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #e2e8f0; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-active { background: #eab308; color: #000; }
    </style>
</head>
<body>

    <header id="navbar" class="hidden fixed top-0 w-full z-50 glass p-4 flex justify-between items-center border-b border-slate-800">
        <h1 class="text-xl font-black text-yellow-500 italic">mNeet PRO</h1>
        <div class="flex items-center gap-3">
            <div id="coinBox" class="hidden bg-yellow-600/20 px-3 py-1 rounded-full border border-yellow-500/30">
                <span id="bpDisplay" class="text-yellow-500 font-bold text-xs">0 BP</span>
            </div>
            <button onclick="window.logout()" class="text-slate-400 p-2"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <div id="authPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-8 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-4xl font-black text-yellow-500 italic text-center mb-8 uppercase">mNeet</h2>
            
            <div id="roleSelection" class="flex p-1 bg-black rounded-2xl mb-6 border border-slate-800">
                <button onclick="setRole('student')" id="role-student" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase btn-active">Student</button>
                <button onclick="setRole('teacher')" id="role-teacher" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-slate-500">Teacher</button>
                <button onclick="setRole('admin')" id="role-admin" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase text-slate-500">Admin</button>
            </div>

            <div id="signupFields" class="hidden space-y-3 mb-4">
                <input type="text" id="regName" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-black border border-slate-800 outline-none focus:border-yellow-500">
                <select id="regSubject" class="hidden w-full p-4 rounded-2xl bg-black border border-slate-800 text-slate-400 outline-none">
                    <option value="Biology">Biology</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                </select>
            </div>

            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-black border border-slate-800 outline-none mb-3">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-black border border-slate-800 outline-none mb-6">
            
            <button id="authBtn" onclick="handleAuth()" class="w-full bg-yellow-600 py-4 rounded-2xl font-black text-black uppercase shadow-lg">Sign In</button>
            
            <button onclick="toggleAuthMode()" id="toggleBtn" class="w-full mt-6 text-[10px] font-bold text-yellow-500 uppercase tracking-widest">Create New Access</button>
        </div>
    </div>

    <main id="appBody" class="hidden pt-24 pb-32 max-w-4xl mx-auto px-6"></main>

    <div id="modal" class="hidden fixed inset-0 z-[100] bg-black flex flex-col p-6">
        <div class="flex justify-between items-center mb-4">
            <div id="quizTimer" class="hidden bg-red-600 px-4 py-1 rounded-full font-mono font-bold">00:00</div>
            <button onclick="closeModal()" class="text-3xl text-white ml-auto">&times;</button>
        </div>
        <div id="modalContent" class="flex-1 overflow-y-auto"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
