<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: 20px auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #e74a3b;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #c0392b;
    }
  </style>
</head>

<body>

  <h2>Student Dashboard</h2>

  <div class="card">
    <h3 id="welcomeUser">Loading...</h3>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="card">
    <h3>Students List</h3>
    <ul id="studentList"></ul>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "nest-mr-bio.firebaseapp.com",
  projectId: "nest-mr-bio",
  storageBucket: "nest-mr-bio.appspot.com",
  messagingSenderId: "1051338751163",
  appId: "1:1051338751163:web:59e5f33e44b265b31fbd9e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Protect dashboard
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    document.getElementById("welcomeUser").innerText = 
      "Welcome: " + user.email;
  }
});

// Logout
document.getElementById("logoutBtn").addEventListener("click", () => {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
});
