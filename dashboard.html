<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#020617] text-slate-200">
    <div class="fixed top-0 inset-x-0 h-16 bg-[#020617]/80 backdrop-blur-md border-b border-slate-800 z-50 flex items-center justify-between px-6">
        <h2 class="font-black text-yellow-500 italic">mNeet</h2>
        <div class="flex items-center gap-3">
            <div class="text-right"><p id="rankName" class="text-[9px] font-black text-indigo-400 uppercase">Aspirant</p></div>
            <div class="bg-yellow-500 text-slate-950 px-4 py-1.5 rounded-xl font-black text-sm" id="bpVal">0 BP</div>
        </div>
    </div>

    <main class="pt-24 pb-10 px-6 max-w-2xl mx-auto space-y-6">
        <div class="grid grid-cols-1 gap-4">
            <button onclick="nav('bio')" class="p-8 rounded-[2.5rem] bg-slate-900 border border-slate-800 flex justify-between items-center group active:scale-95 transition-all">
                <span class="font-black text-lg"><i class="fas fa-dna mr-4 text-yellow-500"></i> BIOLOGY</span>
                <span class="text-xs font-bold text-slate-500">32 Chapters</span>
            </button>
            <button onclick="nav('phy')" class="p-8 rounded-[2.5rem] bg-slate-900 border border-slate-800 flex justify-between items-center group active:scale-95 transition-all">
                <span class="font-black text-lg"><i class="fas fa-atom mr-4 text-blue-500"></i> PHYSICS</span>
                <span class="text-xs font-bold text-slate-500">28 Chapters</span>
            </button>
            <button onclick="nav('chem')" class="p-8 rounded-[2.5rem] bg-slate-900 border border-slate-800 flex justify-between items-center group active:scale-95 transition-all">
                <span class="font-black text-lg"><i class="fas fa-flask mr-4 text-emerald-500"></i> CHEMISTRY</span>
                <span class="text-xs font-bold text-slate-500">19 Chapters</span>
            </button>
            <button onclick="nav('ncert')" class="p-8 rounded-[2.5rem] bg-emerald-500/10 border border-emerald-500/30 flex justify-between items-center group active:scale-95 transition-all">
                <span class="font-black text-lg text-emerald-500"><i class="fas fa-book mr-4"></i> NCERT BOOKS</span>
                <i class="fas fa-file-pdf text-emerald-500"></i>
            </button>
        </div>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
